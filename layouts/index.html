{{ define "title" }}{{ .Title }}{{ end }}
{{ define "main" }}
<article>
    <header class="article-header">
        <h1 class="article-title">{{ .Title }}</h1>
        <div class="article-meta">
            <span><i data-lucide="calendar"></i> {{ if .Date }}{{ .Date.Format "January 2, 2006" }}{{ else }}July 01, 2026{{ end }}</span>
            <span><i data-lucide="clock"></i> {{ .ReadingTime }} min read</span>
            {{ with .Params.tags }}
            <span><i data-lucide="tag"></i> {{ delimit . ", " }}</span>
            {{ end }}
        </div>
    </header>

    <section class="article-body">
        {{ .Content }}
    </section>
</article>
{{ end }}
